name: Publish

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.2.3 等

jobs:
  test-and-publish:
    name: Test & Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # 發布到 GitHub Packages 需要此權限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 先跑測試，失敗就不發布
      - name: Run tests
        run: ./gradlew test

      # 從 tag 取得版本號（v1.0.0 → 1.0.0）
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 發布到 GitHub Packages（Maven）
      - name: Publish to GitHub Packages
        run: ./gradlew publish -Pversion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}