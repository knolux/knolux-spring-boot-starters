name: Publish

on:
  push:
    tags:
      - '*/v*'    # e.g. knolux-redis-spring-boot-starter/v1.0.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-publish:
    name: Test & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract module and version from tag
        id: meta
        run: |
          TAG=${GITHUB_REF_NAME}
          MODULE=${TAG%/v*}
          VERSION=${TAG#*/v}
          echo "module=$MODULE" >> $GITHUB_OUTPUT`
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run module tests
        run: ./gradlew :${{ steps.meta.outputs.module }}:test

      - name: Publish to GitHub Packages
        run: ./gradlew :${{ steps.meta.outputs.module }}:publish -Pversion=${{ steps.meta.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
